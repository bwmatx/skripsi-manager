name: skripsi_manager
description: "Skripsi Manager – Offline-first thesis management app"
publish_to: "none"
version: 1.3.4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  sqflite: ^2.4.1
  path: ^1.9.0

  # File handling
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  open_file: ^3.5.10

  # Secure local storage for PIN
  flutter_secure_storage: ^9.2.4

  # HTTP for Gemini API + DeepSeek fallback
  http: ^1.4.0

  # DOCX parsing (ZIP + XML)
  archive: ^3.6.1
  xml: ^6.5.0

  # PDF text extraction (real text, not rendering)
  syncfusion_flutter_pdf: ^28.2.12

  # Connectivity check (offline detection)
  connectivity_plus: ^6.1.4

  # ML Kit Translation (EN <-> ID, offline on-device)
  google_mlkit_translation: ^0.12.0

  cupertino_icons: ^1.0.8
  google_mlkit_language_id: ^0.13.1

  # Markdown rendering for AI responses
  flutter_markdown: ^0.7.4

  flutter_svg: ^2.0.10
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
